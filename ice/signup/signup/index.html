<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }
        #formContainer {
            background-color: rgb(255, 255, 255);
            border-radius: 20px;
            border: 7px solid rgb(19, 19, 185);
            width: 500px;
            display: flex;
            flex-direction: column;
            margin: auto;
            margin-top: 20px;
            overflow: hidden;

        }
        #form-header{
            background-image: url("images/jesus_feeds_5000.jpeg");
            background-size: cover;
            height: 200px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 20px;
            margin-left: 25px;
            margin-right: 25px;
        }
        h3 {
            margin: auto;
            padding-top: 20px;
            padding-bottom: 20px;
        }
        #closeBtn{
            width: 30px;
        }
        #formLowerSection {
            grid-column: 1/3;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #formLowerSection section {
            margin-top: 10px;
            margin-bottom: 10px;
        }
        #form-footer {
            display: flex;
            margin-top: 20px;
        }
        #form-footer img {
            width: 97px;
            margin-right: 4px;
        }
        h1 {
            color: white;
            filter: drop-shadow(2px 2px 0px #000000);
            margin: auto;
            margin-top: 65px;
            margin-bottom: 0;
            font-size: 30pt;
               
        }
        h2 {
            color: white;
            filter: drop-shadow(2px 2px 0px #000000);
            margin: auto;
            margin-top: 0;
            margin-bottom: 0;
            font-weight: 100;
            font-size: 25pt;      
        }

        

    </style>




</head>

<body>
    <div id="formContainer">
        <div id="form-header">
            <button type="button" id="closeBtn">X</button>
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <div id="formLowerSection">
                <section>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>

                <section>
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>

                <section>
                    <button type="submit">Submit</button>
                </section>
            </div>
        </form>
        <div id="form-footer">
            <img src="images/old_testament.webp" alt="old_testament">
            <img src="images/new_testament.webp" alt="new_testament">
            <img src="images/book_of_mormon.webp" alt="book_of_mormon">
            <img src="images/doctrine_and_covenants.webp" alt="doctrine_and_covenants">
            <img src="images/pearl_of_great_price.webp" alt="pearl_of_great_price">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
