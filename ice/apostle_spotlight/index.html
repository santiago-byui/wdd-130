<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>

        body {
            display: flex;
            justify-content: center;
        }
        #container {
            background-image: url("images/christus.webp");
            background-size:auto;
            background-position: center;
            background-repeat: no-repeat;
            border: 9px solid black;
            border-radius: 25px;
            display: block;
        }
                h1 {
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 100;
            font-size: 40px;
            display: flex;
            justify-content: center;
            padding-top: 10px;
            padding-bottom: 10px;
            margin: 0;
        }
        #first-presidency {
            display: flex;
            align-items: baseline;
            justify-content: center;
            padding-left: 200px;
            padding-right: 200px;
        }
        #first-presidency img {
            width: 135px;
            height: 135px;
            object-fit: cover;
            border-radius: 50%;
            border: 9px solid white;
            margin-left: 12px;
            margin-right: 12px;
        }
        #first-presidency img:hover {
            border: 9px solid rgb(174, 174, 255);
        }
        #first-presidency img#oaks-img {
            height: 145px;
            width: 145px;
        }
        h2 {
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 100;
            font-size: 28px;
            display: flex;
            justify-content: center;
        }
        #quorum {
            display: flex;
            justify-content: center
        }
        #quorum img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            border: 9px solid white;
            margin-left: 8px;
            margin-right: 8px;
            margin-bottom: 25px;
        }
        #quorum img:hover {
            border: 9px solid rgb(174, 174, 255);
        }

    </style>
</head>
<body>
    <div id="container">
        <h1>First Presidency</h1>
        <div id="first-presidency">
            <img src="images/eyring.webp" alt="eyring">
            <img src="images/oaks.webp" alt="oaks" id="oaks-img">
            <img src="images/christofferson.webp" alt="christofferson">
        </div>
        <h2>Quorum of the Twelve Apostles</h2>
        <div id="quorum">
            <img src="images/holland.webp" alt="holland">
            <img src="images/uchtdorf.webp" alt="uchtdorf">
            <img src="images/bednar.webp" alt="bednar">
            <img src="images/cook.webp" alt="cook">
        </div>
        <div id="quorum">
            <img src="images/anderson.webp" alt="anderson">
            <img src="images/rasband.webp" alt="rasband">
            <img src="images/stevenson.webp" alt="stevenson">
            <img src="images/renlund.webp" alt="renlund">
        </div>
        <div id="quorum">
            <img src="images/gong.webp" alt="gong">
            <img src="images/soares.webp" alt="soares">
            <img src="images/kearon.webp" alt="kearon">
            <img src="images/causse.webp" alt="causse">
        </div>
    </div>
</body>
</html>
